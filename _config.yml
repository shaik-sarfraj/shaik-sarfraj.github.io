# IMAGES / SOCIAL PREVIEW
# =====================================================

logo: "/assets/images/favicon.png"

og_image: "/assets/images/social-preview.png"

social:
  type: Person
  name: "Shaik Sarfraj"
  links:
    - "https://github.com/shaik-sarfraj"
    - "https://www.linkedin.com/in/sarfraj-shaik-119b2b1b7"



plugins:
  - jekyll-include-cache
  - jekyll-seo-tag

collections:
  portfolio:
    output: true
    permalink: /portfolio/:path/

defaults:
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false

remote_theme: "mmistakes/minimal-mistakes@4.22.0"

title: "Sarfraj Shaik | GIS & Urban Analytics Portfolio"

description: "Portfolio showcasing GIS, urban analytics, spatial analysis, and data-driven planning projects."

author:
  name: "Shaik Sarfraj"
  avatar: "/assets/images/profile.jpeg"
  bio: "Master of City Planning (City Analytics) | GIS | Urban Analytics"
  location: "Sydney, Australia"

logo: "/assets/images/favicon.png"

repository: "shaik-sarfraj/shaik-sarfraj.github.io"

minimal_mistakes_skin: "default"








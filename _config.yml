plugins:
  - jekyll-include-cache
  - jekyll-seo-tag

collections:
  portfolio:
    output: true
    permalink: /portfolio/:path/

defaults:
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      image: "/assets/images/social-preview.png"

remote_theme: "mmistakes/minimal-mistakes@4.22.0"


# =====================================================
# SITE INFORMATION
# =====================================================

title: "Sarfraj Shaik | GIS & Urban Analytics Portfolio"

description: >
  GIS, urban analytics, spatial analysis, Python-based workflows,
  and data-driven planning projects exploring cities through
  geospatial technologies and evidence-based methods.


url: "https://shaik-sarfraj.github.io"

repository: "shaik-sarfraj/shaik-sarfraj.github.io"


# =====================================================
# AUTHOR INFORMATION
# =====================================================

author:
  name: "Shaik Sarfraj"
  avatar: "/assets/images/profile.jpeg"
  bio: "Master of City Planning (City Analytics) | GIS | Urban Analytics"
  location: "Sydney, Australia"

  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/sarfraj-shaik-119b2b1b7"

    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/shaik-sarfraj"


